<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flag Picker Demo</title>
<style>
  .flag-select {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 20px;
  }
  #selectedFlag {
    font-size: 1.3rem;
    min-width: 140px;
  }
  select {
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 1rem;
  }
</style>
</head>
<body>

<div class="flag-select">
  <span id="selectedFlag">🌏</span>
  <select id="userNationality" required onchange="updateFlag(this)">
    <option value="">Select Nationality</option>
    <option value="United States">🇺🇸 United States</option>
    <option value="United Kingdom">🇬🇧 United Kingdom</option>
    <option value="Australia">🇦🇺 Australia</option>
    <option value="Canada">🇨🇦 Canada</option>
    <option value="Laos">🇱🇦 Laos</option>
    <option value="Myanmar">🇲🇲 Myanmar</option>
  </select>
</div>

<script>
const flagMap = {
  'United States': '🇺🇸',
  'United Kingdom': '🇬🇧',
  'Australia': '🇦🇺',
  'Canada': '🇨🇦',
  'Laos': '🇱🇦',
  'Myanmar': '🇲🇲'
};

function updateFlag(selectElem) {
  const country = selectElem.value;
  const flag = flagMap[country] || '🌏';
  document.getElementById('selectedFlag').textContent = country ? `${flag} ${country}` : '🌏';
}
</script>

</body>
</html>
