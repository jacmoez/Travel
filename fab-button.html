<div class="fab-container">

    <i class="fas fa-comment-dots"></i>
  </button>

  <!-- Single popup area (replaces fab-menu) -->
  <div class="fab-popup" id="fabPopup">
    <div class="popup-header">
      <i class="fas fa-headset"></i>
      <span>Contact & Support</span>
      <button class="popup-close" id="popupCloseBtn">&times;</button>
    </div>

      <a href="https://chat.google.com/" target="_blank" rel="noopener noreferrer" class="popup-link" id="googleChatLinkPopup">
        <i class="fab fa-google"></i>
        <span>Open Google Chat</span>
        <i class="fas fa-external-link-alt"></i>
      </a>
      <!-- Copy email area -->
      <div class="popup-copy" id="copyEmailArea">
        <div class="copy-row">
          <i class="fas fa-envelope"></i>
          <span id="emailText">dreamdestination@gmail.com</span>

            <!-- <i class="fas fa-copy"> -->
            </i> Copy

    </div>
  </div>

</div>
