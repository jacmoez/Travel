<!-- slider.html - Image slider data (images, alt texts, dot structure) -->
<div class="relative rounded-2xl overflow-hidden shadow-lg group">
  <!-- Slide 1 - Mekong river / countryside -->
  <img src="https://images.unsplash.com/photo-1542367592-8849eb950fd9?auto=format&fit=crop&w=1200&q=80"
       class="slider-img w-full h-[280px] md:h-[400px] object-cover" alt="Mekong river, Laos">
  <!-- Slide 2 - Muang Feuang riverside nature -->
  <img src="https://images.unsplash.com/photo-1559244153-33f6ba1c1a7a?auto=format&fit=crop&w=1200&q=80"
       class="slider-img w-full h-[280px] md:h-[400px] object-cover" alt="Laos countryside and river">
  <!-- Slide 3 - Morning alms ceremony (cultural) -->
  <img src="https://images.unsplash.com/photo-1528181304800-259b08848526?auto=format&fit=crop&w=1200&q=80"
       class="slider-img w-full h-[280px] md:h-[400px] object-cover" alt="Morning alms giving ceremony">

  <!-- Navigation buttons -->
  <button onclick="prevSlide()" class="absolute left-3 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/60 text-white px-3 py-2 rounded-full text-xl transition z-10">
    <i class="fas fa-chevron-left"></i>
  </button>
  <button onclick="nextSlide()" class="absolute right-3 top-1/2 -translate-y-1/2 bg-black/40 hover:bg-black/60 text-white px-3 py-2 rounded-full text-xl transition z-10">
    <i class="fas fa-chevron-right"></i>
  </button>

  <!-- Dot indicators -->
  <div class="absolute bottom-4 left-0 right-0 flex justify-center space-x-2 z-10">
    <span class="dot" onclick="currentSlide(0)"></span>
    <span class="dot" onclick="currentSlide(1)"></span>
    <span class="dot" onclick="currentSlide(2)"></span>
  </div>
</div>
