<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>full layout · half carousel + nav bars</title>
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .carousel-slide { transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    body { background: #f1f5f9; font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- ========== TOP NAVIGATION BAR ========== -->
  <header class="bg-white/80 backdrop-blur-sm border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- left: logo + brand -->
        <div class="flex items-center space-x-3">
          <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center text-white font-bold text-xl">✦</div>
          <span class="font-semibold text-slate-800 text-lg">drift</span>
        </div>
        <!-- right: nav links (desktop) -->
        <nav class="hidden md:flex space-x-8 text-sm font-medium text-slate-600">
          <a href="#" class="hover:text-indigo-600 transition">explore</a>
          <a href="#" class="hover:text-indigo-600 transition">journal</a>
          <a href="#" class="hover:text-indigo-600 transition">studio</a>
          <a href="#" class="hover:text-indigo-600 transition">profile</a>
        </nav>
        <!-- mobile menu icon (simple) -->
        <button class="md:hidden p-2 rounded-lg hover:bg-slate-100">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-slate-700">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ========== MAIN CONTENT (carousel) ========== -->
  <main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-6xl mx-auto">
      <h1 class="text-3xl md:text-4xl font-light text-center text-slate-700 mb-6 tracking-tight">
        ✦  half·screen  stillness  ✦
      </h1>

      <!-- CAROUSEL (exactly as before, no autoplay) -->
      <div class="relative group rounded-2xl shadow-2xl bg-white/5 overflow-hidden border border-white/20" id="carouselContainer">
        <!-- slides wrapper -->
        <div id="slidesWrapper" class="flex carousel-slide will-change-transform">
          <!-- slide 1 -->
          <div class="w-full flex-shrink-0 relative h-[50vh] min-h-[320px]">
            <img src="https://picsum.photos/id/1015/1600/900" alt="Mist over mountains" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/70 via-transparent to-transparent pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 right-0 p-6 md:p-8 text-white">
              <span class="text-sm font-medium tracking-widest text-white/70">——  01</span>
              <h2 class="text-3xl md:text-4xl font-semibold mt-2 drop-shadow-lg">silent peaks</h2>
              <p class="text-white/80 max-w-xl mt-1 text-lg">where clouds rest</p>
            </div>
          </div>
          <!-- slide 2 -->
          <div class="w-full flex-shrink-0 relative h-[50vh] min-h-[320px]">
            <img src="https://picsum.photos/id/1043/1600/900" alt="Waterfall" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/70 via-transparent to-transparent pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 right-0 p-6 md:p-8 text-white">
              <span class="text-sm font-medium tracking-widest text-white/70">——  02</span>
              <h2 class="text-3xl md:text-4xl font-semibold mt-2 drop-shadow-lg">flowing grace</h2>
              <p class="text-white/80 max-w-xl mt-1 text-lg">water’s quiet path</p>
            </div>
          </div>
          <!-- slide 3 -->
          <div class="w-full flex-shrink-0 relative h-[50vh] min-h-[320px]">
            <img src="https://picsum.photos/id/100/1600/900" alt="Forest" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/70 via-transparent to-transparent pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 right-0 p-6 md:p-8 text-white">
              <span class="text-sm font-medium tracking-widest text-white/70">——  03</span>
              <h2 class="text-3xl md:text-4xl font-semibold mt-2 drop-shadow-lg">ancient woods</h2>
              <p class="text-white/80 max-w-xl mt-1 text-lg">dappled light & moss</p>
            </div>
          </div>
          <!-- slide 4 -->
          <div class="w-full flex-shrink-0 relative h-[50vh] min-h-[320px]">
            <img src="https://picsum.photos/id/1018/1600/900" alt="Coast" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/70 via-transparent to-transparent pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 right-0 p-6 md:p-8 text-white">
              <span class="text-sm font-medium tracking-widest text-white/70">——  04</span>
              <h2 class="text-3xl md:text-4xl font-semibold mt-2 drop-shadow-lg">open sea</h2>
              <p class="text-white/80 max-w-xl mt-1 text-lg">horizons without end</p>
            </div>
          </div>
        </div>

        <!-- prev / next buttons -->
        <button id="prevBtn" aria-label="previous slide" class="absolute left-3 top-1/2 -translate-y-1/2 w-11 h-11 rounded-full bg-white/30 backdrop-blur-sm border border-white/40 text-white hover:bg-white/60 hover:text-slate-800 transition-all duration-300 flex items-center justify-center shadow-lg opacity-0 group-hover:opacity-100 focus:opacity-100">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
          </svg>
        </button>
        <button id="nextBtn" aria-label="next slide" class="absolute right-3 top-1/2 -translate-y-1/2 w-11 h-11 rounded-full bg-white/30 backdrop-blur-sm border border-white/40 text-white hover:bg-white/60 hover:text-slate-800 transition-all duration-300 flex items-center justify-center shadow-lg opacity-0 group-hover:opacity-100 focus:opacity-100">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
          </svg>
        </button>

        <!-- navigation dots -->
        <div class="absolute bottom-5 left-0 right-0 flex justify-center space-x-3 z-10" id="dotsContainer">
          <button class="dot w-2.5 h-2.5 rounded-full bg-white/50 hover:bg-white transition-all duration-300 data-[active=true]:w-6 data-[active=true]:bg-white" data-index="0" aria-label="go to slide 1"></button>
          <button class="dot w-2.5 h-2.5 rounded-full bg-white/50 hover:bg-white transition-all duration-300 data-[active=true]:w-6 data-[active=true]:bg-white" data-index="1" aria-label="go to slide 2"></button>
          <button class="dot w-2.5 h-2.5 rounded-full bg-white/50 hover:bg-white transition-all duration-300 data-[active=true]:w-6 data-[active=true]:bg-white" data-index="2" aria-label="go to slide 3"></button>
          <button class="dot w-2.5 h-2.5 rounded-full bg-white/50 hover:bg-white transition-all duration-300 data-[active=true]:w-6 data-[active=true]:bg-white" data-index="3" aria-label="go to slide 4"></button>
        </div>
      </div>

      <p class="text-center text-sm text-slate-500 mt-5 italic">use arrows, dots, or keyboard ← →</p>
    </div>
  </main>

  <!-- ========== BOTTOM NAVIGATION BAR (mobile style) ========== -->
  <footer class="bg-white/80 backdrop-blur-sm border-t border-slate-200 py-2 sticky bottom-0 z-30">
    <div class="max-w-lg mx-auto px-4">
      <div class="flex justify-around items-center text-xs text-slate-500">
        <!-- home -->
        <button class="flex flex-col items-center p-2 text-indigo-600">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
          </svg>
          <span class="mt-1">home</span>
        </button>
        <!-- search -->
        <button class="flex flex-col items-center p-2 hover:text-indigo-600 transition">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
          </svg>
          <span class="mt-1">search</span>
        </button>
        <!-- heart -->
        <button class="flex flex-col items-center p-2 hover:text-indigo-600 transition">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
          </svg>
          <span class="mt-1">faves</span>
        </button>
        <!-- profile -->
        <button class="flex flex-col items-center p-2 hover:text-indigo-600 transition">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <span class="mt-1">profile</span>
        </button>
      </div>
    </div>
  </footer>

  <!-- carousel script (identical to previous, no autoplay) -->
  <script>
    (function() {
      const slidesWrapper = document.getElementById('slidesWrapper');
      const slides = slidesWrapper.children;
      const totalSlides = slides.length;
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const dots = document.querySelectorAll('.dot');

      let currentIndex = 0;
      let isTransitioning = false;
      const TRANSITION_MS = 500;

      function goToSlide(newIndex) {
        if (isTransitioning) return;
        if (newIndex < 0) newIndex = totalSlides - 1;
        if (newIndex >= totalSlides) newIndex = 0;
        if (newIndex === currentIndex) return;

        isTransitioning = true;
        currentIndex = newIndex;

        slidesWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;

        dots.forEach((dot, idx) => {
          dot.setAttribute('data-active', idx === currentIndex ? 'true' : 'false');
        });

        setTimeout(() => {
          isTransitioning = false;
        }, TRANSITION_MS);
      }

      prevBtn.addEventListener('click', () => goToSlide(currentIndex - 1));
      nextBtn.addEventListener('click', () => goToSlide(currentIndex + 1));

      dots.forEach(dot => {
        dot.addEventListener('click', () => {
          const index = parseInt(dot.getAttribute('data-index'), 10);
          if (!isNaN(index)) goToSlide(index);
        });
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          goToSlide(currentIndex - 1);
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          goToSlide(currentIndex + 1);
        }
      });

      // initial dot state
      dots.forEach((dot, idx) => {
        dot.setAttribute('data-active', idx === 0 ? 'true' : 'false');
      });

      slidesWrapper.style.transform = 'translateX(0%)';
    })();
  </script>
</body>
</html>
